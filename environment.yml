name: recomfi
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.11
  - pip
  # Aligner backends (external tools). progressivemauve is the default and
  # recommended backend; sibeliaz and cactus are optional alternatives.
  - bioconda::mauve
  - conda-forge::boost-cpp=1.74.0
  - bioconda::sibeliaz
  - bioconda::cactus
  - pip:
      - -e .
